# Small SPI-NAND profile for fast framework self-test.
FLASH_CLASS SPI_NAND
CHIP_NAME DEMO_SPINAND
STORAGE_FILE demo_spinand_storage.bin

MAIN_SIZE 256
SPARE_SIZE 16
PAGE_SIZE 272
PAGES_PER_BLOCK 4
BLOCKS 4
PLANES 1

JEDEC_ID 5A 20 01
DEFAULT_ALL_PROTECTED 1
FEATURE_A0_DEFAULT 0x7C
FEATURE_B0_DEFAULT 0x10
ECC_SUPPORTED 1
ECC_ENABLE 1
ECC_RESERVED_START 260
ECC_RESERVED_END 272
MAX_PARTIAL_PROGRAMS 4
STRICT_SEQUENTIAL_PROGRAM 1
PROGRAM_LOAD_REQUIRES_WEL 1
RESET_STORAGE_ON_START 1
AUTO_COMPLETE 0

F_CLOCK_MHZ 100
F_READ_MHZ 50
F_QUAD_MHZ 80
T_READ_ECC_OFF_US 25
T_READ_ECC_ON_US 50
T_PROG_US 250
T_PROG_MAX_US 700
T_ERASE_US 2000
T_ERASE_MAX_US 10000
T_RESET_US 500
